{% extends 'app/base.html' %}
{% load static %}
{% block title %} Display Board {% endblock %}
{% block content %}

<style>
    body {
        margin: 0;  
        background: #037a29;
        color: white;
    }

    /* HEADER */
    .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px;
        background: #037a29;
    }
    .left {
        display: flex;
        align-items: center;   
    }

    .logo {
        height: 70px;
        width: auto;
    }

    .title {
        font-size: 2vw;
        font-weight: bold;
        margin-left: 10px;
    }

    .time {
        font-size: 2vw;
    }

    /* MAIN */
    .container {
        display: flex;
        height: 30vh;
    }

    /* LANES */
    .lane {
        flex: 1;
    }

    .priority { 
        background: #ffa8a8; 
        color: #ff1f1f;
        letter-spacing: 10px;
        font-weight: bolder;
    }
    .regular {
        background: #9dcbff; 
        color: #150df7;
        letter-spacing: 10px;
        font-weight: bolder;
    }

    .lane h2 {
        text-align: center;
        font-size: 2vw;
        color: #ffffff;
    }

    .queue-number {
        text-align: center;
        font-size: 5vw;
        margin: 10px 0;
    }

    /* SERVING */
    .serving {
        background: #037a29;
        padding: 10px;
    }

    .serving h2 {
        text-align: center;
        font-size: 2vw;
        color: #f8f2f2;
    }

    .windows {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 15px;
    }

    /* CARD */
    .window-card {
        
        overflow: hidden;
    }

    /* HEADER (TITLE) */
    .window-header {
        background: #004d40;
        color: white;
        text-align: center;
        font-size: 1.5vw;
        font-weight: bold;
        padding: 10px;
    }

    /* BODY (QUEUE AREA) */
    .window-body {
        background: #3bfd79;
        padding: 5px;
        text-align: center;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Container */
    .client-card {
        margin: 10px 0;
    }

    /* Text */
    .queue-text {
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.0vw;
        font-weight: bold;
        color: #000000;
        gap: 20px;
    }

    /* ICON STYLE */
    .queue-icon {
        font-size: 1.5vw;
        color: #ac0000;
        animation: popIn 0.3s ease;
    }

    /* ANIMATION */
    @keyframes popIn {
        from {
            transform: scale(0.5);
            opacity: 0;
        }
        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    /* 📱 MOBILE / SMALL SCREEN */
    @media (max-width: 768px) {
        .container {
            height: 10vh;
        }
        .logo {
            height: 40px;
        }

        .container {
            flex-direction: column;
            height: auto;
        }
        .title { 
            font-size: 18px; 
        }
        .time { 
            font-size: 14px; 
        }

        .lane h2 {
             font-size: 18px; 
            }
        .queue-number { 
            font-size: 24px; 
        }
        .windows {
            grid-template-columns: repeat(2, 1fr);
        }
        .window {
            font-size: 16px;
        }
    }
</style>

</head>
<body>

<div class="header">
    <div class="left">
        <img src="{% static 'images/logo.png' %}" alt="Logo" class="logo">
    <div class="title">DEPARTMENT OF HEALTH</div>
    </div>
    <div class="time" id="time"></div>
</div>

<div class="container">
    <div class="lane priority">
        <h2>PRIORITY LANE</h2>
        <div class="queue-number" id="fastCurrent">00</div>
    </div>

    <div class="lane regular">
        <h2>REGULAR LANE</h2>
        <div class="queue-number" id="regularCurrent">00</div>
    </div>
</div>

<div class="serving">
    <h2>NOW SERVING</h2>

    <div class="windows">

        <div class="window-card">
            <div class="window-header">RLED</div>
            <div class="window-body" id="RLED">
                <div class="clients-list"></div>
            </div>
        </div>

        <div class="window-card">
            <div class="window-header">MSD</div>
            <div class="window-body" id="MSD">
                <div class="clients-list"></div>
            </div>
        </div>

        <div class="window-card">
            <div class="window-header">LHSD</div>
            <div class="window-body" id="LHSD">
                <div class="clients-list"></div>
            </div>
        </div>

        <div class="window-card">
            <div class="window-header">RD/ARD</div>
            <div class="window-body" id="RD/ARD">
                <div class="clients-list"></div>
            </div>
        </div>

    </div>
</div>

<script>
function updateTime() {
    const now = new Date();
    document.getElementById("time").innerHTML =
        now.toLocaleTimeString();
}
setInterval(updateTime, 1000);
updateTime();
</script>

        </script>
        <audio id="queue-audio" preload="auto">
            <source src="{% static 'audio/ding.mp3' %}" type="audio/mpeg">
          </audio>
          
          <script>
            let audioUnlocked = false;
          
            document.addEventListener("click", () => {
              if (!audioUnlocked) {
                const audio = document.getElementById("queue-audio");
                audio.play().then(() => {
                  audio.pause(); // pause right after to avoid sound
                  audioUnlocked = true;
                }).catch((err) => console.warn("Audio not unlocked yet", err));
              }
            });
          
            function callQueue(queueNumber) {
              if (!audioUnlocked) return;
          
              const audio = document.getElementById("queue-audio");
              const synth = window.speechSynthesis;
          
              if (queueNumber === "00") {
                const emptyQueueAudio = document.getElementById("no-queue-audio");
                if (emptyQueueAudio) {
                  emptyQueueAudio.play();
                } 
                return;
              }
          
              audio.play();
              const message = new SpeechSynthesisUtterance("Proceed to front desk for screening number " + queueNumber);
              synth.speak(message);
                 
            }
            
            function observeQueueChange(queueId) {
              const target = document.getElementById(queueId);
              let lastValue = target.textContent;
          
              const observer = new MutationObserver(() => {
                const currentValue = target.textContent.trim();
                if (currentValue && currentValue !== lastValue) {
                  callQueue(currentValue);
                  lastValue = currentValue;
                }
              });
          
              observer.observe(target, { childList: true, subtree: true });
            }
          
            document.addEventListener("DOMContentLoaded", () => {
              observeQueueChange("regularCurrent");
              observeQueueChange("fastCurrent");
            });
          </script>
{% endblock %}
